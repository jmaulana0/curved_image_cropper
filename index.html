<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curved Image Cropper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom checkerboard pattern for transparent background */
        .checkerboard {
            background-color: #f0f0f0;
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc),
                linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-4 md:p-8">

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Controls Sidebar -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-6 h-fit">
            <div>
                <h1 class="text-xl font-bold text-slate-900 mb-2">Curved Cropper</h1>
                <p class="text-sm text-slate-500">Upload your image and adjust the curve to match your reference.</p>
            </div>

            <!-- Upload -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">1. Upload Image</label>
                <input type="file" id="imageUpload" accept="image/*" class="block w-full text-sm text-slate-500
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-blue-50 file:text-blue-700
                    hover:file:bg-blue-100 cursor-pointer
                "/>
            </div>

            <hr class="border-slate-100">

            <!-- Sliders -->
            <div class="flex flex-col gap-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">2. Adjust Curve Shape</label>
                
                <div>
                    <div class="flex justify-between text-xs text-slate-500 mb-1">
                        <span>Left Edge Height</span>
                        <span id="leftYValue">90%</span>
                    </div>
                    <input type="range" id="leftY" min="0" max="100" value="90" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                </div>

                <div>
                    <div class="flex justify-between text-xs text-slate-500 mb-1">
                        <span>Right Edge Height</span>
                        <span id="rightYValue">60%</span>
                    </div>
                    <input type="range" id="rightY" min="0" max="100" value="60" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                </div>

                <div>
                    <div class="flex justify-between text-xs text-slate-500 mb-1">
                        <span>Curve Bend (Depth)</span>
                        <span id="bendYValue">95%</span>
                    </div>
                    <input type="range" id="bendY" min="0" max="150" value="95" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <hr class="border-slate-100">

            <!-- Action -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">3. Export</label>
                <button id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Download Image
                </button>
            </div>
        </div>

        <!-- Preview Area -->
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center min-h-[400px]">
            <div id="placeholder" class="text-center text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p>Upload an image to see the preview</p>
            </div>
            
            <div class="w-full overflow-hidden rounded-lg checkerboard hidden" id="canvasContainer">
                <canvas id="canvas" class="max-w-full h-auto mx-auto drop-shadow-md"></canvas>
            </div>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const canvasContainer = document.getElementById('canvasContainer');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const downloadBtn = document.getElementById('downloadBtn');

        // Sliders
        const leftYSlider = document.getElementById('leftY');
        const rightYSlider = document.getElementById('rightY');
        const bendYSlider = document.getElementById('bendY');
        
        // Value Displays
        const leftYValue = document.getElementById('leftYValue');
        const rightYValue = document.getElementById('rightYValue');
        const bendYValue = document.getElementById('bendYValue');

        let currentImage = null;

        // Handle Image Upload
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    placeholder.classList.add('hidden');
                    canvasContainer.classList.remove('hidden');
                    downloadBtn.disabled = false;
                    drawCanvas();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Handle Slider Updates
        [leftYSlider, rightYSlider, bendYSlider].forEach(slider => {
            slider.addEventListener('input', (e) => {
                // Update text displays
                if(e.target.id === 'leftY') leftYValue.textContent = e.target.value + '%';
                if(e.target.id === 'rightY') rightYValue.textContent = e.target.value + '%';
                if(e.target.id === 'bendY') bendYValue.textContent = e.target.value + '%';
                
                drawCanvas();
            });
        });

        // Draw Image with Clip Path
        function drawCanvas() {
            if (!currentImage) return;

            // Set canvas size to match original image for high-res output
            canvas.width = currentImage.width;
            canvas.height = currentImage.height;
            const w = canvas.width;
            const h = canvas.height;

            // Clear canvas
            ctx.clearRect(0, 0, w, h);

            // Calculate curve points based on slider percentages
            // We invert the percentages because 0 is the top in Canvas, but conceptually 
            // 100% height for the left edge usually means "at the bottom". 
            // The sliders represent "distance from top".
            const leftY = h * (leftYSlider.value / 100);
            const rightY = h * (rightYSlider.value / 100);
            
            // Bend control point. X is roughly in the middle, Y is controlled by slider.
            const cpX = w * 0.5;
            const cpY = h * (bendYSlider.value / 100);

            // Begin masking path
            ctx.save();
            ctx.beginPath();
            
            // Start top left
            ctx.moveTo(0, 0);
            // Go top right
            ctx.lineTo(w, 0);
            // Go down to the right edge height
            ctx.lineTo(w, rightY);
            // Draw the sweeping curve to the left edge height
            ctx.quadraticCurveTo(cpX, cpY, 0, leftY);
            // Close path back to top left
            ctx.closePath();
            
            // Apply mask
            ctx.clip();

            // Draw image inside the mask
            ctx.drawImage(currentImage, 0, 0, w, h);
            
            // Restore context so subsequent draws aren't clipped
            ctx.restore();
        }

        // Handle Download
        downloadBtn.addEventListener('click', () => {
            if (!currentImage) return;
            
            // Create a temporary link element
            const link = document.createElement('a');
            link.download = 'goalhanger-curved.png'; // Enforces PNG to keep transparency
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

    </script>
</body>
</html>
